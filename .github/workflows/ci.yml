name: Mini Data Platform CI

on:
  push:
    branches:
      - working_from_home
      - master
  pull_request:
    branches:
      - working_from_home
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_AIRFLOW_DB: ${{ secrets.POSTGRES_AIRFLOW_DB }}
      AIRFLOW_EXECUTOR: ${{ secrets.AIRFLOW_EXECUTOR }}
      AIRFLOW_FERNET_KEY: ${{ secrets.AIRFLOW_FERNET_KEY }}
      AIRFLOW_WEBSERVER_SECRET_KEY: ${{ secrets.AIRFLOW_WEBSERVER_SECRET_KEY }}
      MINIO_ROOT_USER: ${{ secrets.MINIO_ROOT_USER }}
      MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create .env for Docker
        run: |
          mkdir -p docker
          cat <<EOF > docker/.env
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_DB=${POSTGRES_DB}
          POSTGRES_HOST=mini_postgres
          POSTGRES_PORT=5432
          POSTGRES_AIRFLOW_DB=${POSTGRES_AIRFLOW_DB}
          AIRFLOW_EXECUTOR=${AIRFLOW_EXECUTOR}
          AIRFLOW_FERNET_KEY=${AIRFLOW_FERNET_KEY}
          AIRFLOW_WEBSERVER_SECRET_KEY=${AIRFLOW_WEBSERVER_SECRET_KEY}
          MINIO_ROOT_USER=${MINIO_ROOT_USER}
          MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
          EOF

      - name: Build Docker Images
        run: |
          docker compose -f docker/docker-compose.yml build

      # ------------------------------------------------------------
      # Start Infrastructure (Postgres + MinIO only)
      # ------------------------------------------------------------
      - name: Start Core Infrastructure
        run: |
          docker compose -f docker/docker-compose.yml up -d postgres minio

      - name: Wait for Postgres
        run: |
          for i in {1..20}; do
            if docker exec mini_postgres pg_isready -U $POSTGRES_USER; then
              echo "Postgres ready"
              exit 0
            fi
            echo "Waiting for Postgres..."
            sleep 5
          done
          echo "Postgres did not become ready"
          exit 1

      # ------------------------------------------------------------
      # Initialize Airflow Metadata
      # ------------------------------------------------------------
      - name: Initialize Airflow Metadata DB
        run: |
          docker compose -f docker/docker-compose.yml run --rm airflow-webserver airflow db init

      # ------------------------------------------------------------
      # Start Airflow Services
      # ------------------------------------------------------------
      - name: Start Airflow Services
        run: |
          docker compose -f docker/docker-compose.yml up -d airflow-scheduler airflow-webserver

      - name: Wait for Scheduler Startup
        run: sleep 30

      # ------------------------------------------------------------
      # Ensure DAG Registered in Metadata
      # ------------------------------------------------------------
      - name: Wait for DAG metadata registration
        run: |
          for i in {1..30}; do
            if docker exec mini_postgres psql -U $POSTGRES_USER -d $POSTGRES_AIRFLOW_DB -t -c \
              "SELECT dag_id FROM dag WHERE dag_id='sales_etl_pipeline';" | grep -q sales_etl_pipeline; then
              echo "DAG metadata registered"
              exit 0
            fi
            echo "Waiting for DAG metadata..."
            sleep 5
          done
          echo "DAG not registered in metadata"
          exit 1

      # ------------------------------------------------------------
      # Create Test CSV
      # ------------------------------------------------------------
      - name: Create test CSV inside Airflow container
        run: |
          docker exec mini-airflow-web bash -c 'cat <<EOF > /tmp/test_sales.csv
          order_code,customer_code,customer_name,email,country,product_code,quantity,unit_price,total_price
          ORD001,CUST001,John Doe,john@example.com,Ghana,PROD001,2,50,100
          EOF'

      # ------------------------------------------------------------
      # Ensure MinIO Bucket Exists
      # ------------------------------------------------------------
      - name: Ensure sales-raw bucket exists
        run: |
          docker exec mini-airflow-web python -c "
          from minio import Minio
          client = Minio(
              'mini-minio:9000',
              access_key='${MINIO_ROOT_USER}',
              secret_key='${MINIO_ROOT_PASSWORD}',
              secure=False
          )
          if not client.bucket_exists('sales-raw'):
              client.make_bucket('sales-raw')
          print('Bucket ready')
          "

      - name: Upload test CSV to MinIO
        run: |
          docker exec mini-airflow-web python -c "
          from minio import Minio
          client = Minio(
              'mini-minio:9000',
              access_key='${MINIO_ROOT_USER}',
              secret_key='${MINIO_ROOT_PASSWORD}',
              secure=False
          )
          client.fput_object('sales-raw', 'ci_test.csv', '/tmp/test_sales.csv')
          print('Upload successful')
          "

      # ------------------------------------------------------------
      # Trigger DAG
      # ------------------------------------------------------------
      - name: Trigger ETL DAG
        run: |
          docker exec mini-airflow-web airflow dags trigger sales_etl_pipeline

      - name: Wait for DAG Execution
        run: sleep 60

      # ------------------------------------------------------------
      # Validate Data Flow
      # ------------------------------------------------------------
      - name: Validate Data in sales_db
        run: |
          COUNT=$(docker exec mini_postgres psql -U $POSTGRES_USER -d $POSTGRES_DB -t -c \
            "SELECT COUNT(*) FROM fact_sales;")
          echo "fact_sales count: $COUNT"
          if [ "$COUNT" -lt 1 ]; then
            echo "ETL failed: No rows in fact_sales"
            exit 1
          fi

      # ------------------------------------------------------------
      # Cleanup
      # ------------------------------------------------------------
      - name: Shutdown Containers
        if: always()
        run: |
          docker compose -f docker/docker-compose.yml down -v