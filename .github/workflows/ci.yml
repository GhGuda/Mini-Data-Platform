name: Mini Data Platform CI

on:
  push:
    branches:
      - working_from_home
      - master
  pull_request:
    branches:
      - working_from_home
      - master

permissions:
  contents: read
  packages: write

jobs:
  build-and-test-CI:
    runs-on: ubuntu-latest

    env:
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_AIRFLOW_DB: ${{ secrets.POSTGRES_AIRFLOW_DB }}
      AIRFLOW_EXECUTOR: ${{ secrets.AIRFLOW_EXECUTOR }}
      AIRFLOW_FERNET_KEY: ${{ secrets.AIRFLOW_FERNET_KEY }}
      AIRFLOW_WEBSERVER_SECRET_KEY: ${{ secrets.AIRFLOW_WEBSERVER_SECRET_KEY }}
      MINIO_ROOT_USER: ${{ secrets.MINIO_ROOT_USER }}
      MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
      MINIO_BUCKET_RAW: ${{ secrets.MINIO_BUCKET_RAW }}
      MINIO_BUCKET_PROCESSED: ${{ secrets.MINIO_BUCKET_PROCESSED }}
      MINIO_ENDPOINT: minio:9000

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Image Tag
        id: vars
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Apply CI defaults
        run: |
          echo "POSTGRES_DB=${POSTGRES_DB:-sales_db}" >> "$GITHUB_ENV"
          echo "POSTGRES_AIRFLOW_DB=${POSTGRES_AIRFLOW_DB:-airflow_db}" >> "$GITHUB_ENV"
          echo "AIRFLOW_EXECUTOR=${AIRFLOW_EXECUTOR:-LocalExecutor}" >> "$GITHUB_ENV"
          echo "MINIO_BUCKET_RAW=${MINIO_BUCKET_RAW:-sales-raw}" >> "$GITHUB_ENV"
          echo "MINIO_BUCKET_PROCESSED=${MINIO_BUCKET_PROCESSED:-sales-processed}" >> "$GITHUB_ENV"

      - name: Reset Docker Compose State
        run: |
          docker compose -f docker/docker-compose.yml down -v --remove-orphans || true

      - name: Create .env for Docker
        run: |
          mkdir -p docker
          cat <<EOF > docker/.env
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_DB=${POSTGRES_DB}
          POSTGRES_HOST=postgres
          POSTGRES_PORT=5432
          POSTGRES_AIRFLOW_DB=${POSTGRES_AIRFLOW_DB}
          AIRFLOW_EXECUTOR=${AIRFLOW_EXECUTOR}
          AIRFLOW_FERNET_KEY=${AIRFLOW_FERNET_KEY}
          AIRFLOW_WEBSERVER_SECRET_KEY=${AIRFLOW_WEBSERVER_SECRET_KEY}
          MINIO_ROOT_USER=${MINIO_ROOT_USER}
          MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
          MINIO_BUCKET_RAW=${MINIO_BUCKET_RAW}
          MINIO_BUCKET_PROCESSED=${MINIO_BUCKET_PROCESSED}
          MINIO_ENDPOINT=${MINIO_ENDPOINT}
          EOF

      - name: Build Docker Images
        run: |
          docker compose -f docker/docker-compose.yml build

      # ------------------------------------------------------------
      # Start Infrastructure (Postgres + MinIO only)
      # ------------------------------------------------------------
      - name: Start Core Infrastructure
        run: |
          docker compose -f docker/docker-compose.yml up -d postgres minio

      - name: Wait for Postgres
        run: |
          for i in {1..20}; do
            if docker exec mini_postgres pg_isready -U $POSTGRES_USER; then
              echo "Postgres ready"
              exit 0
            fi
            echo "Waiting for Postgres..."
            sleep 5
          done
          echo "Postgres did not become ready"
          exit 1

      - name: Ensure sales schema exists
        run: |
          docker exec mini_postgres psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" \
            -f /docker-entrypoint-initdb.d/01_schema.sql

      # ------------------------------------------------------------
      # Initialize Airflow Metadata
      # ------------------------------------------------------------
      - name: Initialize Airflow Metadata DB
        run: |
          docker compose -f docker/docker-compose.yml run --rm airflow-webserver db init

      # ------------------------------------------------------------
      # Start Airflow Services
      # ------------------------------------------------------------
      - name: Start Airflow Services
        run: |
          docker compose -f docker/docker-compose.yml up -d airflow-scheduler airflow-webserver

      - name: Wait for Scheduler Startup
        run: sleep 30

      # ------------------------------------------------------------
      # Ensure DAG Registered in Metadata
      # ------------------------------------------------------------
      - name: Wait for DAG metadata registration
        run: |
          for i in {1..30}; do
            if docker exec mini_postgres psql -U $POSTGRES_USER -d $POSTGRES_AIRFLOW_DB -t -c \
              "SELECT dag_id FROM dag WHERE dag_id='sales_etl_pipeline';" | grep -q sales_etl_pipeline; then
              echo "DAG metadata registered"
              exit 0
            fi
            echo "Waiting for DAG metadata..."
            sleep 5
          done
          echo "DAG not registered in metadata"
          exit 1

      # ------------------------------------------------------------
      # Create Test CSV
      # ------------------------------------------------------------
      - name: Create test CSV inside Airflow container
        run: |
          docker exec mini-airflow-web bash -c 'cat <<EOF > /tmp/test_sales.csv
          order_code,customer_code,customer_name,email,country,product_code,product_name,category,quantity,unit_price,order_date
          ORD001,CUST001,John Doe,john@example.com,Ghana,PROD001,Widget A,Electronics,2,50,2026-02-20
          EOF'

      # ------------------------------------------------------------
      # Ensure MinIO Bucket Exists
      # ------------------------------------------------------------
      - name: Ensure required MinIO buckets exist
        run: |
          docker exec mini-airflow-web python -c "
          from minio import Minio
          client = Minio(
              '${MINIO_ENDPOINT}',
              access_key='${MINIO_ROOT_USER}',
              secret_key='${MINIO_ROOT_PASSWORD}',
              secure=False
          )
          for bucket in ('${MINIO_BUCKET_RAW}', '${MINIO_BUCKET_PROCESSED}'):
              if not client.bucket_exists(bucket):
                  client.make_bucket(bucket)
          print('Buckets ready')
          "

      - name: Upload test CSV to MinIO
        run: |
          docker exec mini-airflow-web python -c "
          from minio import Minio
          client = Minio(
              '${MINIO_ENDPOINT}',
              access_key='${MINIO_ROOT_USER}',
              secret_key='${MINIO_ROOT_PASSWORD}',
              secure=False
          )
          client.fput_object('${MINIO_BUCKET_RAW}', 'ci_test.csv', '/tmp/test_sales.csv')
          print('Upload successful')
          "

      # ------------------------------------------------------------
      # Trigger DAG
      # ------------------------------------------------------------
      - name: Run ETL DAG synchronously
        run: |
          docker exec mini-airflow-web airflow dags unpause sales_etl_pipeline
          docker exec mini-airflow-web airflow dags test sales_etl_pipeline 2026-02-23

      # ------------------------------------------------------------
      # Validate Data Flow
      # ------------------------------------------------------------
      - name: Validate Data in sales_db
        run: |
          DB_EXISTS=$(docker exec mini_postgres psql -U "$POSTGRES_USER" -d postgres -tAc \
            "SELECT 1 FROM pg_database WHERE datname='${POSTGRES_DB}';")
          if [ "$DB_EXISTS" != "1" ]; then
            echo "Target database '${POSTGRES_DB}' does not exist."
            echo "Available databases:"
            docker exec mini_postgres psql -U "$POSTGRES_USER" -d postgres -tAc \
              "SELECT datname FROM pg_database ORDER BY datname;"
            exit 1
          fi

          for i in {1..24}; do
            COUNT=$(docker exec mini_postgres psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" -tAc \
              "SELECT COUNT(*) FROM fact_sales;")
            echo "fact_sales count (attempt ${i}): $COUNT"
            if [ "${COUNT:-0}" -ge 1 ]; then
              exit 0
            fi
            sleep 5
          done

          echo "ETL failed: No rows in fact_sales after waiting."
          exit 1

      - name: Login to GHCR
        if: github.event_name == 'push'
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME != '' && secrets.GHCR_USERNAME || github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
        run: echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin

      - name: Tag Images
        if: github.event_name == 'push'
        run: |
          TAG=${{ steps.vars.outputs.IMAGE_TAG }}

          docker tag docker-airflow-webserver ghcr.io/ghguda/mini-data-platform/airflow-web:latest
          docker tag docker-airflow-webserver ghcr.io/ghguda/mini-data-platform/airflow-web:$TAG

          docker tag docker-airflow-scheduler ghcr.io/ghguda/mini-data-platform/airflow-scheduler:latest
          docker tag docker-airflow-scheduler ghcr.io/ghguda/mini-data-platform/airflow-scheduler:$TAG

          docker tag docker-storage-init ghcr.io/ghguda/mini-data-platform/storage-init:latest
          docker tag docker-storage-init ghcr.io/ghguda/mini-data-platform/storage-init:$TAG

          docker tag docker-data-generator ghcr.io/ghguda/mini-data-platform/data-generator:latest
          docker tag docker-data-generator ghcr.io/ghguda/mini-data-platform/data-generator:$TAG

      - name: Push Images
        if: github.event_name == 'push'
        run: |
          TAG=${{ steps.vars.outputs.IMAGE_TAG }}

          docker push ghcr.io/ghguda/mini-data-platform/airflow-web:latest
          docker push ghcr.io/ghguda/mini-data-platform/airflow-web:$TAG

          docker push ghcr.io/ghguda/mini-data-platform/airflow-scheduler:latest
          docker push ghcr.io/ghguda/mini-data-platform/airflow-scheduler:$TAG

          docker push ghcr.io/ghguda/mini-data-platform/storage-init:latest
          docker push ghcr.io/ghguda/mini-data-platform/storage-init:$TAG

          docker push ghcr.io/ghguda/mini-data-platform/data-generator:latest
          docker push ghcr.io/ghguda/mini-data-platform/data-generator:$TAG

      # ------------------------------------------------------------
      # Cleanup
      # ------------------------------------------------------------
      - name: Shutdown Containers
        if: always()
        run: |
          docker compose -f docker/docker-compose.yml down -v


  deploy-CD:
    needs: build-and-test-CI
    runs-on: self-hosted

    steps:
      - name: Login to GHCR
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME != '' && secrets.GHCR_USERNAME || github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
        run: echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin

      - name: Pull latest images
        run: docker compose -f docker/docker-compose.prod.yml pull

      - name: Restart containers
        run: docker compose -f docker/docker-compose.prod.yml up -d --remove-orphans
